const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl',{antialias:true,alpha:false});
canvas.width=600;canvas.height=600;gl.viewport(0,0,600,600);
const VS=`attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=a_pos*0.5+0.5;v_uv.y=1.0-v_uv.y;gl_Position=vec4(a_pos,0,1);}`;
const FS=`precision highp float;
uniform sampler2D u_bg,u_sh;uniform float u_time,u_wind,u_dusk;varying vec2 v_uv;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float sn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){return sn(p)*0.50+sn(p*2.1+vec2(3.1,7.4))*0.25+sn(p*4.3+vec2(1.7,2.9))*0.15+sn(p*8.7+vec2(4.1,6.3))*0.10;}
void main(){
  vec2 uv=v_uv;float t=u_time;
  vec2 fuv=uv*vec2(2.0,2.6);
  float n1=fbm(fuv+vec2(t*0.18,t*0.10));
  float n2=fbm(fuv+vec2(7.1,2.9)+vec2(t*0.13,t*0.21));
  float sx=sin(t*0.75+n1*3.2)*0.50+sin(t*1.55+n1*5.0)*0.30+sin(t*2.8+n2*2.5)*0.20;
  float sy=sin(t*0.60+n2*3.2)*0.38+sin(t*1.25+n2*4.2)*0.30+sin(t*2.3+n1*2.0)*0.32;
  float tip=pow(clamp(uv.y,0.0,1.0),0.50);
  float dx=sx*u_wind*0.013*tip;float dy=sy*u_wind*0.005*tip;
  vec3 bg=texture2D(u_bg,uv).rgb;
  vec4 sh=texture2D(u_sh,clamp(uv+vec2(dx,dy),0.0,1.0));float sd=sh.a;
  vec3 result=mix(bg,bg*0.38,sd);
  float bgLuma=dot(bg,vec3(0.299,0.587,0.114));
  float lit=smoothstep(0.50,0.72,bgLuma)*(1.0-sd);
  float gli=sin(t*0.31+fbm(uv*2.6)*3.6)*0.42+sin(t*0.18+fbm(uv*1.5+vec2(1.9,3.8))*3.0)*0.33+sin(t*0.50+n1*4.2)*0.25;
  gli=clamp(gli*0.5+0.5,0.0,1.0)*lit*0.048;
  result+=vec3(1.0,0.88,0.54)*gli;
  result+=vec3(0.10,0.04,-0.04)*u_dusk*(1.0-sd);
  result+=vec3(0.04,-0.01,-0.05)*u_dusk*sd;
  result*=1.0-u_dusk*0.16;
  vec2 vig=(uv-0.5)*2.0;
  result*=1.0-smoothstep(0.5,2.0,dot(vig,vig))*(0.05+u_dusk*0.25);
  gl_FragColor=vec4(clamp(result,0.0,1.0),1.0);
}`;
function mkShader(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'a_pos');gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
const uTime=gl.getUniformLocation(prog,'u_time'),uWind=gl.getUniformLocation(prog,'u_wind'),
      uDusk=gl.getUniformLocation(prog,'u_dusk'),uBg=gl.getUniformLocation(prog,'u_bg'),uSh=gl.getUniformLocation(prog,'u_sh');
function mkTex(unit,img){
  gl.activeTexture(gl.TEXTURE0+unit);const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
}
let loaded=0;
function onLoad(){loaded++;if(loaded===2){gl.uniform1i(uBg,0);gl.uniform1i(uSh,1);}}
const bgImg=new Image();bgImg.onload=()=>{mkTex(0,bgImg);onLoad();};bgImg.src=BG_SRC;
const shImg=new Image();shImg.onload=()=>{mkTex(1,shImg);onLoad();};shImg.src=SH_SRC;
const t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  const wind=0.80+0.10*Math.sin(t*0.40)+0.10*Math.sin(t*0.17+1.3);
  const dusk=Math.max(0,Math.sin(t*Math.PI/45))*0.75;
  gl.uniform1f(uTime,t);gl.uniform1f(uWind,wind);gl.uniform1f(uDusk,dusk);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(frame);
}
frame();
